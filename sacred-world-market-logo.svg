<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 200 200" role="img" aria-label="Sacred World Market logo — an elephant beneath a Lanna temple roof, within a golden ring">
      <defs>
        <linearGradient id="goldRing" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#F2C468"/>
          <stop offset=".55" stop-color="#E3A83E"/>
          <stop offset="1" stop-color="#B87F24"/>
        </linearGradient>
      </defs>

      <!-- outer ring -->
      <circle cx="100" cy="100" r="96" fill="none" stroke="url(#goldRing)" stroke-width="3.5"/>
      <circle cx="100" cy="100" r="88" fill="none" stroke="url(#goldRing)" stroke-width="1.2" opacity=".8"/>

      <!-- lotus petal ticks around the ring -->
      <g fill="#E3A83E">
        <g id="petal"><path d="M100 6 q3 5 0 9 q-3 -4 0 -9z"/></g>
        <use href="#petal" transform="rotate(30 100 100)"/>
        <use href="#petal" transform="rotate(60 100 100)"/>
        <use href="#petal" transform="rotate(120 100 100)"/>
        <use href="#petal" transform="rotate(150 100 100)"/>
        <use href="#petal" transform="rotate(180 100 100)"/>
        <use href="#petal" transform="rotate(210 100 100)"/>
        <use href="#petal" transform="rotate(240 100 100)"/>
        <use href="#petal" transform="rotate(300 100 100)"/>
        <use href="#petal" transform="rotate(330 100 100)"/>
        <use href="#petal" transform="rotate(90 100 100)"/>
        <use href="#petal" transform="rotate(270 100 100)"/>
      </g>

      <!-- Lanna temple roof (two tiers with upturned chofa finials) -->
      <g stroke="url(#goldRing)" stroke-width="4" fill="none" stroke-linecap="round">
        <path d="M40 66 Q100 38 160 66"/>
        <path d="M40 66 q-5 -6 -7 -13"/>
        <path d="M160 66 q5 -6 7 -13"/>
        <path d="M56 52 Q100 30 144 52"/>
        <path d="M56 52 q-4 -5 -5 -11"/>
        <path d="M144 52 q4 -5 5 -11"/>
      </g>
      <!-- spire -->
      <path d="M100 16 l4 12 h-8 z" fill="#E3A83E"/>

      <!-- elephant silhouette -->
      <g fill="#E3A83E">
        <ellipse cx="92" cy="112" rx="34" ry="26"/>              <!-- body -->
        <circle cx="127" cy="102" r="19"/>                       <!-- head -->
        <path d="M139 112 C147 122 146 136 136 143 C133 145 130 142 133 139 C140 133 141 123 135 116 Z"/> <!-- trunk -->
        <rect x="68" y="126" width="10" height="22" rx="4"/>     <!-- back leg -->
        <rect x="98" y="126" width="10" height="22" rx="4"/>     <!-- front leg -->
        <path d="M60 104 q-8 2 -6 10 q4 -2 6 -10z"/>             <!-- tail -->
      </g>
      <path d="M118 89 q-13 -5 -17 8 q-3 11 9 13 q8 1 10 -6 q1 -9 -2 -15z" fill="#1B2231" opacity=".9"/> <!-- ear -->
      <circle cx="131" cy="97" r="2.4" fill="#1B2231"/>          <!-- eye -->
      <!-- ceremonial blanket line -->
      <path d="M78 92 q14 -8 28 0" stroke="#1B2231" stroke-width="3" fill="none" stroke-linecap="round"/>

      <!-- ground line + lotus base -->
      <path d="M52 152 h96" stroke="url(#goldRing)" stroke-width="3" stroke-linecap="round"/>
      <g fill="#E3A83E">
        <path d="M100 162 q-6 10 0 16 q6 -6 0 -16z"/>
        <path d="M88 165 q-2 9 5 12 q3 -7 -5 -12z"/>
        <path d="M112 165 q2 9 -5 12 q-3 -7 5 -12z"/>
      </g>
    </svg>